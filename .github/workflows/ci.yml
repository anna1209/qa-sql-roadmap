name: SQL Database Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  database-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.46
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: shopsmart_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: shopsmart_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL service to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }}
          do
            echo "Waiting for MySQL service..."
            sleep 5
          done

      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }} shopsmart_test < schema.sql

      - name: Load Seed Data
        run: |
          mysql -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }} shopsmart_test < seed_data.sql

      - name: Run tests
        run: |
          mkdir -p test-reports
          pytest automation/tests \
            -v \
            - html=reports/sql_test_report.html \
            - self-contained-html

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: sql-test-report
          path: test-reports/sql_test_report.html

